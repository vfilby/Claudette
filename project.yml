name: Claudette
options:
  bundleIdPrefix: com.vfilby
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Ad-hoc local signing: no Apple Developer team required to build & run locally.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  Claudette:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfilby.Claudette
        PRODUCT_NAME: Claudette
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        # Drop the built .app into ./build for easy launching.
        CONFIGURATION_BUILD_DIR: $(PROJECT_DIR)/build
