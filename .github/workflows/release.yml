name: Release

# Produces a fully signed + notarized + stapled Claudette.app, packaged as both
# a .zip and a .dmg, and attaches them to a GitHub Release.
#
# Trigger by pushing a version tag, e.g.:
#     git tag v0.2.0 && git push origin v0.2.0
# or run manually from the Actions tab (workflow_dispatch) supplying the tag.
#
# Required repository secrets (see .github/RELEASE_SETUP.md):
#   BUILD_CERTIFICATE_BASE64  base64 of the "Developer ID Application" .p12
#   P12_PASSWORD              password protecting that .p12
#   KEYCHAIN_PASSWORD         any password for the throwaway CI keychain
#   APPLE_TEAM_ID             10-character Apple Developer Team ID
#   AC_API_KEY_ID             App Store Connect API key ID
#   AC_API_ISSUER_ID          App Store Connect API issuer ID
#   AC_API_KEY_BASE64         base64 of the App Store Connect API key (.p8)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release, e.g. v0.2.0'
        required: true

permissions:
  contents: write          # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-15
    env:
      APP_NAME: Claudette
      AC_KEY_PATH: ${{ github.workspace }}/.ci-secrets/ac_api_key.p8
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          {
            echo "tag=$REF"
            echo "version=$VERSION"
            echo "zip=${APP_NAME}-${VERSION}.zip"
            echo "dmg=${APP_NAME}-${VERSION}.dmg"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $REF (marketing version $VERSION)"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install xcodegen

      - name: Import Developer ID signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output "$CERT_PATH"

          # A short-lived keychain that only exists for this job.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          # Let codesign use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Make the new keychain searchable alongside the defaults. The command
          # substitution is meant to word-split into separate keychain args.
          # shellcheck disable=SC2046
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            exit 1
          fi
          echo "Found signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY"   >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare notarization credentials
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$AC_KEY_PATH")"
          echo -n "$AC_API_KEY_BASE64" | base64 --decode --output "$AC_KEY_PATH"

      - name: Generate project & build (signed, hardened runtime)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodegen generate
          xcodebuild \
            -project Claudette.xcodeproj \
            -scheme Claudette \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            MARKETING_VERSION="${{ steps.ver.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            build

      - name: Verify signature
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E 'Authority|TeamIdentifier|flags' || true
          # The debug entitlement is an automatic notarization rejection — fail
          # early and clearly if it ever leaks back into a release build.
          if codesign -d --entitlements - "$APP" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "::error::Signed app still carries com.apple.security.get-task-allow — notarization would be rejected."
            exit 1
          fi

      - name: Notarize & staple the app
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          SUBMIT_ZIP="$RUNNER_TEMP/notarize-app.zip"

          ditto -c -k --keepParent "$APP" "$SUBMIT_ZIP"

          # `notarytool submit --wait` exits 0 even when Apple rejects the upload,
          # so capture the result and inspect the status ourselves — on anything
          # other than Accepted, dump Apple's per-issue log and fail loudly.
          RESULT=$(xcrun notarytool submit "$SUBMIT_ZIP" \
            --key "$AC_KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait --output-format json)
          echo "$RESULT"
          SUBMISSION_ID=$(echo "$RESULT" | plutil -extract id raw -)
          STATUS=$(echo "$RESULT" | plutil -extract status raw -)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$AC_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" || true
            exit 1
          fi

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package .zip and .dmg
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          ZIP="${{ steps.ver.outputs.zip }}"
          DMG="${{ steps.ver.outputs.dmg }}"

          # Distribution zip of the stapled app.
          ditto -c -k --keepParent "$APP" "$ZIP"

          # Simple, headless-reliable DMG (no AppleScript window styling).
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "${APP_NAME} ${{ steps.ver.outputs.version }}" \
            -srcfolder "$STAGE" -ov -format UDZO "$DMG"

          # Sign the DMG itself so Gatekeeper trusts the container too.
          codesign --force --sign "$SIGN_IDENTITY" --timestamp "$DMG"

      - name: Notarize & staple the DMG
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="${{ steps.ver.outputs.dmg }}"
          RESULT=$(xcrun notarytool submit "$DMG" \
            --key "$AC_KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait --output-format json)
          echo "$RESULT"
          SUBMISSION_ID=$(echo "$RESULT" | plutil -extract id raw -)
          STATUS=$(echo "$RESULT" | plutil -extract status raw -)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$AC_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" || true
            exit 1
          fi
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            "${{ steps.ver.outputs.zip }}" \
            "${{ steps.ver.outputs.dmg }}" \
            --title "${APP_NAME} ${{ steps.ver.outputs.version }}" \
            --generate-notes

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf "$(dirname "$AC_KEY_PATH")" || true
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
